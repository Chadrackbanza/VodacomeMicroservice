name: "Scan de Sécurité avec Trivy"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan IaC avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Scan d'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nginx:1.27-alpine'
          format: 'table'
          exit-code: '1'          # Ajouté : bloque si des vulnérabilités HIGH/CRITICAL sont trouvées
          severity: 'CRITICAL,HIGH' # Ajouté : cible le niveau de sévérité
          ignore-unfixed: true
