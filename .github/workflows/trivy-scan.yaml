name: "Scan de Sécurité avec Trivy"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # 1. Construire l'image locale avec ton Dockerfile
      - name: Build de l'image Docker
        run: docker build -t mon-nginx:latest -f docker/Dockerfile .

      # 2. Scan IaC (Terraform)
      - name: Scan IaC avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # 3. Scan de ton image locale nouvellement construite
      - name: Scan d'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mon-nginx:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
