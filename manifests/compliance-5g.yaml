# 1. Interdiction du tag latest
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce
  rules:
  - name: validate-image-tag
    match:
      resources:
        kinds:
        - Pod
    exclude:
      resources:
        namespaces:
        - gatekeeper-system
    validate:
      message: "L'utilisation du tag 'latest' est interdite."
      pattern:
        spec:
          containers:
          - image: "!*:latest"

---
# 2. Interdiction du root
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-user
spec:
  validationFailureAction: Enforce
  rules:
  - name: validate-run-as-non-root
    match:
      resources:
        kinds:
        - Pod
    exclude:
      resources:
        namespaces:
        - gatekeeper-system
    validate:
      message: "Les conteneurs ne doivent pas s'exécuter en tant que root."
      pattern:
        spec:
          securityContext:
            runAsNonRoot: true
          containers:
          - securityContext:
              runAsNonRoot: true

---
# 3. Filesystem lecture seule
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: readonly-rootfs
spec:
  validationFailureAction: Enforce
  rules:
  - name: require-readonly-rootfs
    match:
      resources:
        kinds:
        - Pod
    exclude:
      resources:
        namespaces:
        - gatekeeper-system
    validate:
      message: "Le filesystem racine doit être en lecture seule."
      pattern:
        spec:
          containers:
          - securityContext:
              readOnlyRootFilesystem: true

---
# 4. Labels obligatoires
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
spec:
  validationFailureAction: Enforce
  rules:
  - name: check-required-labels
    match:
      resources:
        kinds:
        - Pod
    exclude:
      resources:
        namespaces:
        - gatekeeper-system
    validate:
      message: "Chaque Pod doit avoir les labels 'app' et 'tier'."
      pattern:
        metadata:
          labels:
            app: "?*"
            tier: "?*"

---
# 5. Annotation de sécurité
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-security-annotation
spec:
  validationFailureAction: Enforce
  rules:
  - name: check-security-annotation
    match:
      resources:
        kinds:
        - Deployment
    exclude:
      resources:
        namespaces:
        - gatekeeper-system
    validate:
      message: "Chaque déploiement doit avoir l'annotation 'security: verified'."
      pattern:
        metadata:
          annotations:
            security: "verified"

---
# 6. Restriction des registres d'images (Corrigée)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registry
spec:
  validationFailureAction: Enforce
  rules:
  - name: validate-image-registry
    match:
      resources:
        kinds:
        - Pod
    exclude:
      resources:
        namespaces:
        - gatekeeper-system
    validate:
      message: "Les images doivent provenir de registres approuvés."
      pattern:
        spec:
          containers:
          - image: "myregistry.io/* | openpolicyagent/*"
