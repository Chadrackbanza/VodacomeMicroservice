apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: vodaservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 443
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true  # <--- CORRECTION AJOUTÉE
          allowPrivilegeEscalation: false # <--- Ajouté pour durcir la sécurité
          capabilities:
            drop: ["ALL"]                 # <--- Ajouté pour restreindre les privilèges
